```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Chai Dhaba Counter</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:120px;
}

#counter{
font-size:70px;
margin:30px;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Chai Dhaba Digital Counter</h2>

<div id="counter">0</div>

<button onclick="addChai()">Add Chai</button>
<button onclick="removeChai()">Remove Chai</button>

<script>

let count = 0;   // using let (not var)

function addChai(){

count = count + 1;

document.getElementById("counter").innerText = count;

}

function removeChai(){

if(count > 0){

count = count - 1;

document.getElementById("counter").innerText = count;

}

}

</script>

</body>
</html>
